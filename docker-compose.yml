services:
  html2pdf:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./.env:/app/.env:ro
    environment:
      - TZ=${TZ:-UTC}
      - PORT=8000
      - HOST=0.0.0.0
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    entrypoint: |
      sh -c '
      if [ -z "$$TZ" ]; then
        # Try to get system timezone on Linux
        if [ -f /etc/timezone ]; then
          export TZ=$$(cat /etc/timezone)
        # Try to get system timezone on macOS
        elif [ -f /etc/localtime ]; then
          export TZ=$$(readlink /etc/localtime | sed "s#/usr/share/zoneinfo/##")
        fi
      fi
      poetry run uvicorn app.main:app --host $$HOST --port $$PORT
      '

  worker:
    build: .
    volumes:
      - ./.env:/app/.env:ro
    environment:
      - TZ=${TZ:-UTC}
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: unless-stopped
    entrypoint: |
      sh -c '
      if [ -z "$$TZ" ]; then
        if [ -f /etc/timezone ]; then
          export TZ=$$(cat /etc/timezone)
        elif [ -f /etc/localtime ]; then
          export TZ=$$(readlink /etc/localtime | sed "s#/usr/share/zoneinfo/##")
        fi
      fi
      poetry run celery -A app.core.celery_app worker --loglevel=info --concurrency=${WORKER_CONCURRENCY:-2}
      '

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  redis_data: