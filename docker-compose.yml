version: '3.8'

services:
  html2pdf:
    build: .
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./.env:/app/.env:ro
    environment:
      - TZ=${TZ:-UTC}
      - PORT=${PORT}
      - HOST=${HOST:-0.0.0.0}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-2}
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    entrypoint: |
      sh -c '
      if [ -z "$$TZ" ]; then
        if [ -f /etc/timezone ]; then
          export TZ=$$(cat /etc/timezone)
        elif [ -f /etc/localtime ]; then
          export TZ=$$(readlink /etc/localtime | sed "s#/usr/share/zoneinfo/##")
        fi
      fi
      poetry run uvicorn app.main:app --host $$HOST --port $$PORT
      '

  worker:
    build: .
    volumes:
      - ./.env:/app/.env:ro
    environment:
      - TZ=${TZ:-UTC}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-2}
    depends_on:
      - redis
    restart: unless-stopped
    entrypoint: |
      sh -c '
      if [ -z "$$TZ" ]; then
        if [ -f /etc/timezone ]; then
          export TZ=$$(cat /etc/timezone)
        elif [ -f /etc/localtime ]; then
          export TZ=$$(readlink /etc/localtime | sed "s#/usr/share/zoneinfo/##")
        fi
      fi
      poetry run celery -A app.core.celery_app worker --loglevel=info --concurrency=$$WORKER_CONCURRENCY
      '

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  redis_data: